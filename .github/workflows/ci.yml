name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cd examples/web && npm ci && npx tsc --noEmit

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    # Only run if test secrets are available (not on forks)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install Playwright
        run: npx playwright install chromium
      - name: Run integration tests
        run: npm run test:web
        env:
          JAMBONZ_SIP_SERVER: ${{ secrets.JAMBONZ_SIP_SERVER }}
          JAMBONZ_SIP_USERNAME: ${{ secrets.JAMBONZ_SIP_USERNAME }}
          JAMBONZ_SIP_PASSWORD: ${{ secrets.JAMBONZ_SIP_PASSWORD }}
          JAMBONZ_CALL_TARGET: ${{ secrets.JAMBONZ_CALL_TARGET }}

  lint:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prettier --check "packages/*/src/**/*.ts"
